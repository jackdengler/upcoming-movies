name: Refresh release data

on:
  schedule:
    - cron: "0 12 * * 1"
  workflow_dispatch:
    inputs:
      month:
        description: "Month (YYYY-MM). Leave blank to fetch the whole current year."
        required: false
        default: ""
  push:
    paths:
      - ".github/workflows/refresh-data.yml"
      - "scripts/fetch-tmdb.mjs"

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Plan months
        id: plan
        run: |
          if [ -n "${{ inputs.month }}" ]; then
            echo "months=${{ inputs.month }}" >> "$GITHUB_OUTPUT"
          else
            YEAR=$(date -u +%Y)
            LIST=""
            for M in 01 02 03 04 05 06 07 08 09 10 11 12; do
              LIST="$LIST $YEAR-$M"
            done
            echo "months=$LIST" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch from TMDB
        env:
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
          MONTHS: ${{ steps.plan.outputs.months }}
        run: |
          for m in $MONTHS; do
            echo "::group::Fetch $m"
            MONTH="$m" node scripts/fetch-tmdb.mjs
            echo "::endgroup::"
          done

      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          if [ -z "$(git status --porcelain data/)" ]; then
            echo "No changes"
            exit 0
          fi
          git add data/
          git commit -m "Refresh release data"
          for i in 1 2 3 4; do
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 2))
          done
          echo "Push failed after retries" >&2
          exit 1
